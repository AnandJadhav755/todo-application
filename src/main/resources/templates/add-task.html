<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TaskFlow · Create New Task</title>
    <!-- Google Fonts + Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* decorative blobs - same modern flair as main page */
        body::before {
            content: '';
            position: fixed;
            top: -15%;
            left: -10%;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(37,99,235,0.2) 0%, rgba(37,99,235,0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            right: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, rgba(139,92,246,0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        /* modern card container with glass effect */
        .glass-card {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 2px 6px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 2rem 2rem 2.2rem;
            transition: all 0.3s ease;
        }

        /* header section with back button */
        .form-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }

        .form-header h2 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1E2A5E, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-header h2 i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #2563eb;
            font-size: 1.7rem;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 0.45rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            color: #334155;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }

        .back-btn i {
            font-size: 0.8rem;
        }

        .back-btn:hover {
            background: white;
            border-color: #2563eb;
            color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        /* modern form styling */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.2px;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        label i {
            color: #2563eb;
            font-size: 0.9rem;
            width: 20px;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.85rem 1rem;
            font-family: 'Inter', monospace;
            font-size: 0.95rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.2rem;
            background: #ffffff;
            transition: all 0.2s ease;
            outline: none;
            color: #0f172a;
            font-weight: 500;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
            background: #ffffff;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            border-radius: 1.2rem;
        }

        /* status select custom styling */
        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2347567b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1rem;
            cursor: pointer;
        }

        /* action buttons group */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-save {
            background: linear-gradient(105deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 0.85rem 1.8rem;
            font-weight: 600;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
            font-family: 'Inter', sans-serif;
        }

        .btn-save i {
            font-size: 1rem;
        }

        .btn-save:hover {
            background: linear-gradient(105deg, #1d4ed8, #1e3a8a);
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(37, 99, 235, 0.35);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #cbd5e1;
            padding: 0.85rem 1.6rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            color: #475569;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-cancel i {
            font-size: 0.85rem;
        }

        .btn-cancel:hover {
            background: white;
            border-color: #ef4444;
            color: #dc2626;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.03);
        }

        /* additional micro animations & helper */
        .helper-note {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 1.5rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-top: 1px solid rgba(203, 213, 225, 0.5);
            padding-top: 1.2rem;
        }

        .helper-note i {
            font-size: 0.7rem;
        }

        /* responsive */
        @media (max-width: 500px) {
            .glass-card {
                padding: 1.5rem;
            }
            .form-header h2 {
                font-size: 1.5rem;
            }
            .action-buttons {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-save, .btn-cancel {
                justify-content: center;
            }
        }

        /* smooth field validation hint (optional subtle) */
        input:invalid, textarea:invalid {
            border-color: #fecaca;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="form-header">
        <h2>
            <i class="fas fa-plus-circle"></i> 
            Create task
        </h2>
        <a th:href="@{/}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to tasks
        </a>
    </div>

    <!-- Modern Thymeleaf form binding - absolutely compatible with backend -->
    <form th:action="@{/save}" th:object="${task}" method="post" id="taskForm">
        <!-- Title field with icon -->
        <div class="form-group">
            <label for="titleInput">
                <i class="fas fa-heading"></i> Title
            </label>
            <input type="text" 
                   id="titleInput"
                   th:field="*{title}" 
                   placeholder="e.g., Finish project report"
                   required 
                   autocomplete="off">
        </div>

        <!-- Description field with textarea -->
        <div class="form-group">
            <label for="descTextarea">
                <i class="fas fa-align-left"></i> Description
            </label>
            <textarea th:field="*{description}" 
                      id="descTextarea" 
                      rows="4" 
                      placeholder="Write details, subtasks, or notes ..."></textarea>
        </div>

        <!-- Status selection with badge style preview -->
        <div class="form-group">
            <label for="statusSelect">
                <i class="fas fa-flag-checkered"></i> Status
            </label>
            <select th:field="*{status}" id="statusSelect">
                <option value="Pending">⏳ Pending — needs attention</option>
                <option value="Completed">✅ Completed — all done</option>
            </select>
        </div>

        <!-- Action Buttons group -->
        <div class="action-buttons">
            <button type="submit" class="btn-save">
                <i class="fas fa-save"></i> Save Task
            </button>
            <a th:href="@{/}" class="btn-cancel">
                <i class="fas fa-times-circle"></i> Cancel
            </a>
        </div>
    </form>

    <div class="helper-note">
        <i class="fas fa-info-circle"></i> 
        Fields with <span style="color:#dc2626;">*</span> are required. Stay productive with TaskFlow.
    </div>
</div>

<!-- Optional micro-interaction: subtle live feedback for title requirement -->
<script>
    (function() {
        // Add tiny ui polish - ensures required field gets subtle focus glow on invalid attempt
        const form = document.getElementById('taskForm');
        const titleInput = document.getElementById('titleInput');

        if (titleInput) {
            titleInput.addEventListener('invalid', function(e) {
                if (this.validity.valueMissing) {
                    this.style.borderColor = '#f97316';
                    this.style.boxShadow = '0 0 0 3px rgba(249,115,22,0.2)';
                }
            });
            titleInput.addEventListener('input', function() {
                this.style.borderColor = '#e2e8f0';
                this.style.boxShadow = 'none';
            });
        }

        // optional smooth ripple on save button click (cosmetic)
        const saveBtn = document.querySelector('.btn-save');
        if (saveBtn) {
            saveBtn.addEventListener('click', function(e) {
                // just a subtle micro-feedback, doesn't interrupt submission
                if (!titleInput.value.trim()) {
                    e.preventDefault(); // but let browser handle required validation
                    titleInput.focus();
                    titleInput.style.borderColor = '#dc2626';
                    titleInput.style.boxShadow = '0 0 0 3px rgba(220,38,38,0.2)';
                } else {
                    // playful animation
                    this.style.transform = 'scale(0.97)';
                    setTimeout(() => {
                        if (this) this.style.transform = '';
                    }, 120);
                }
            });
        }

       
        const inputs = document.querySelectorAll('input, textarea, select');
        inputs.forEach(field => {
            field.addEventListener('focus', () => {
                field.parentElement.classList.add('focused');
            });
            field.addEventListener('blur', () => {
                field.parentElement.classList.remove('focused');
            });
        });
    })();
</script>


</body>
</html>
